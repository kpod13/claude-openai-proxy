name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Run tests with coverage
        run: go test -coverprofile=coverage.out ./...
      - name: Check minimum coverage
        run: |
          MIN_COVERAGE=25
          COVERAGE=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Coverage: ${COVERAGE}% (minimum: ${MIN_COVERAGE}%)"
          if awk "BEGIN { exit !(${COVERAGE} < ${MIN_COVERAGE}) }"; then
            echo "Coverage ${COVERAGE}% is below minimum threshold of ${MIN_COVERAGE}%"
            exit 1
          fi

  build:
    name: Build (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
      - name: Build and package archive
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          BIN="claude-openai-proxy"
          EXT=""
          if [ "$GOOS" = "windows" ]; then EXT=".exe"; fi
          go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME}" -o "${BIN}${EXT}" ./cmd/claude-openai-proxy
          mkdir -p dist
          ARCHIVE="${BIN}_${VERSION}_${GOOS}_${GOARCH}"
          if [ "$GOOS" = "windows" ]; then
            zip "dist/${ARCHIVE}.zip" "${BIN}${EXT}"
          else
            tar -czf "dist/${ARCHIVE}.tar.gz" "${BIN}${EXT}"
          fi
      - name: Upload archive artifact
        uses: actions/upload-artifact@v7
        with:
          name: archive-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Download all archives
        uses: actions/download-artifact@v8
        with:
          path: dist
          merge-multiple: true
      - name: Generate checksums
        run: |
          set -euo pipefail
          cd dist
          sha256sum * > checksums.txt
          cat checksums.txt
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --generate-notes \
            dist/*
      - name: Render Homebrew formula
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          scripts/update-formula.sh "$VERSION" dist/checksums.txt formula/claude-openai-proxy.rb
          cat formula/claude-openai-proxy.rb
      - name: Push formula to tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/kpod13/homebrew-tap.git" tap
          mkdir -p tap/Formula
          cp formula/claude-openai-proxy.rb tap/Formula/claude-openai-proxy.rb
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/claude-openai-proxy.rb
          if git diff --staged --quiet; then
            echo "Formula already up to date."
          else
            git commit -m "claude-openai-proxy ${GITHUB_REF_NAME}"
            git push
          fi
